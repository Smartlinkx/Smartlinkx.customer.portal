<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Portal Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand">Customer Portal</div>
      <p class="muted">Login using your Account No and Password</p>

      <form id="portalLoginForm">
        <div class="form-grid-1">
          <div class="form-group">
            <label for="account_no">Account No</label>
            <input type="text" id="account_no" required />
          </div>

          <div class="form-group">
            <label for="portal_password">Password</label>
            <input type="password" id="portal_password" required />
          </div>

          <button type="submit" class="btn-primary">Login</button>
        </div>
      </form>

      <div id="portalLoginMessage" class="message"></div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/portal-login.js"></script>
</body>
</html>
