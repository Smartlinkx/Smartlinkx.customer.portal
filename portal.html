<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Portal</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="container topbar-inner">
      <div>
        <div class="topbar-title">Customer Portal</div>
        <div id="portalWelcomeText" class="muted topbar-subtitle"></div>
      </div>
      <div class="topbar-right">
        <button id="portalLogoutBtn" class="btn-light">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="cards">
      <div class="stat-card">
        <div class="stat-label">Outstanding Balance</div>
        <div id="portalTotalUnpaid" class="stat-value">₱0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Paid</div>
        <div id="portalTotalPaid" class="stat-value">₱0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Advance Credit</div>
        <div id="portalAdvanceCredit" class="stat-value">₱0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Status</div>
        <div id="portalStatus" class="stat-value">-</div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">My Profile</h2>
      <div id="portalMessage" class="message"></div>

      <div class="form-grid">
        <div class="form-group">
          <label>Account No</label>
          <input type="text" id="profileAccountNo" readonly />
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="profileFullName" readonly />
        </div>
        <div class="form-group">
          <label>Plan</label>
          <input type="text" id="profilePlanName" readonly />
        </div>
        <div class="form-group">
          <label>Contact Number</label>
          <input type="text" id="profileContactNumber" readonly />
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="profileAddress" readonly />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <h2>Billing History</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Billing ID</th>
              <th>Month</th>
              <th>Due Date</th>
              <th>Amount</th>
              <th>Applied</th>
              <th>Balance</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="portalBillsTableBody">
            <tr><td colspan="7" class="empty-cell">No billing history.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <h2>Payment History</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Payment ID</th>
              <th>Billing ID</th>
              <th>Payment Date</th>
              <th>Amount</th>
              <th>Method</th>
              <th>Reference</th>
            </tr>
          </thead>
          <tbody id="portalPaymentsTableBody">
            <tr><td colspan="6" class="empty-cell">No payment history.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/portal.js"></script>
</body>
</html>
